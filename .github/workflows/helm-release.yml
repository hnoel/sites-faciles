---
name: Release Helm Charts (GitHub Pages)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'charts/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1
        with:
          version: 'v1.7.0'
          skip_packaging: true
          skip_existing: true
          skip_upload: true
          mark_as_latest: true
          charts_dir: 'charts'
          packages_with_index: true
          pages_branch: gh-pages
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
...
