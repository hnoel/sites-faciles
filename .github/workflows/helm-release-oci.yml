---
name: Publishing Helm Charts (GitHub Registry)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'charts/**'

jobs:
  release-oci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # needed for signing the images with GitHub OIDC Token
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0
      - name: Check install!
        run: cosign version

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push charts
        run: |
          echo "Add dependency repos"
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          
          for chart in charts/*/; do
            CHART_NAME=$(basename "$chart")
            CHART_VERSION=$(yq '.version' "$chart/Chart.yaml")

            echo "Packaging $CHART_NAME version $CHART_VERSION"
            helm package "$chart"

            echo "Pushing to GHCR"
            helm push "${CHART_NAME}-${CHART_VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/sites-faciles

            # echo "Sign the images with GitHub OIDC Token"
            # CHART_DIGEST=$(helm show values oci://ghcr.io/hnoel/sites-faciles/${CHART_NAME} --version ${CHART_VERSION} 2>&1 >/dev/null | yq .Digest)
            # cosign sign --yes "ghcr.io/${{ github.repository_owner }}/sites-faciles/${CHART_NAME}:${CHART_VERSION}@${CHART_DIGEST}"
          done
...
