---
name: Publishing Helm Charts (GitHub Registry)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'charts/**'

jobs:
  release-oci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push charts
        run: |
          for chart in charts/*/; do
            CHART_NAME=$(basename "$chart")
            CHART_VERSION=$(yq '.version' "$chart/Chart.yaml")

            echo "Packaging $CHART_NAME version $CHART_VERSION"
            helm package "$chart"

            echo "Pushing to GHCR"
            helm push "${CHART_NAME}-${CHART_VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

            echo "Signing with Cosign"
            cosign sign --yes ghcr.io/${{ github.repository_owner }}/charts/${CHART_NAME}:${CHART_VERSION}
          done
...
